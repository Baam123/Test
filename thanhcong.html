<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoa Tươi Hy Vọng — Đặt Hàng Thành Công</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link href="./img/logo1.png" rel="icon" type="image/x-icon" />
</head>
<body>

  <div id="site-header"></div>

  <div class="container py-5">
    <div class="success-page">
      <div class="success-icon">✓</div>
      <h2 style="font-family:'Playfair Display',serif;color:var(--pink-dark);">Đặt Hàng Thành Công! 🌸</h2>
      <p class="text-muted">Cảm ơn bạn đã tin tưởng Hoa Tươi Hy Vọng</p>
      <div class="order-code" id="success-order-code">HV-000000</div>
      <p class="text-muted" style="font-size:.9rem;">Lưu mã này để tra cứu đơn hàng nhé!</p>
      <div class="row justify-content-center mt-4">
        <div class="col-12 col-md-6">
          <div style="background:#fff;border-radius:14px;border:2px solid var(--pink-light);padding:20px;text-align:left;">
            <h6 style="font-weight:700;color:var(--pink-dark);margin-bottom:12px;">📋 Thông tin đơn hàng</h6>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted" style="font-size:.9rem;">Người nhận:</span>
              <span id="success-name" class="fw-bold" style="font-size:.9rem;"></span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted" style="font-size:.9rem;">Điện thoại:</span>
              <span id="success-phone" class="fw-bold" style="font-size:.9rem;"></span>
            </div>
            <div class="d-flex justify-content-between mb-1">
              <span class="text-muted" style="font-size:.9rem;">Thời gian giao:</span>
              <span id="success-time" class="fw-bold" style="font-size:.9rem;"></span>
            </div>
            <div class="d-flex justify-content-between">
              <span class="text-muted" style="font-size:.9rem;">Tổng tiền:</span>
              <span id="success-total" class="fw-bold" style="font-size:.9rem;color:var(--pink-dark);"></span>
            </div>
          </div>
        </div>
      </div>
      <div class="d-flex justify-content-center gap-3 mt-4 flex-wrap">
        <a href="index.html" class="btn-order px-5 py-2">🏠 Về trang chủ</a>
        <a href="taikhoan.html" class="btn-buy-now px-4 py-2">📦 Xem đơn hàng</a>
      </div>
      <div class="mt-4 p-3"
           style="background:#fff8e1;border-radius:12px;border:1px solid #ffe082;max-width:480px;margin:16px auto 0;">
        <p class="mb-0" style="font-size:.85rem;color:#e65100;">
          <i class="bi bi-info-circle-fill me-2"></i>Chúng tôi sẽ liên hệ xác nhận trong
          <strong>30 phút</strong>. Giao trong <strong>2 giờ</strong>!
        </p>
      </div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script>
    function formatPrice(n) {
      return Number(n).toLocaleString("vi-VN") + " VND";
    }

    function showToast(msg) {
      const box   = document.getElementById("toast-container");
      if (!box) return;
      const toast = document.createElement("div");
      toast.className = "toast-custom";
      toast.innerHTML = `<div class="toast-icon">🌸</div><div style="font-size:.9rem;">${msg}</div>`;
      box.appendChild(toast);
      setTimeout(() => {
        toast.style.cssText += "opacity:0;transform:translateX(100px);transition:.3s;";
        setTimeout(() => toast.remove(), 300);
      }, 2800);
    }

    function handleSearch(val) {
      if (!val.trim()) return;
      window.location.href = "danhmuc.html?search=" + encodeURIComponent(val);
    }

    document.addEventListener("DOMContentLoaded", () => {
      cartUpdateBadge();

      // Đọc thông tin đơn hàng từ sessionStorage
      const raw = sessionStorage.getItem("lastOrder");
      if (raw) {
        try {
          const o = JSON.parse(raw);
          document.getElementById("success-order-code").textContent = o.orderCode || "HV-000000";
          document.getElementById("success-name").textContent       = o.name    || "-";
          document.getElementById("success-phone").textContent      = o.phone   || "-";
          document.getElementById("success-time").textContent       = (o.deliveryDate || "") + " lúc " + (o.deliveryTime || "");
          document.getElementById("success-total").textContent      = formatPrice(o.total || 0);
          // Xóa sau khi đọc để tránh hiện lại khi refresh
          sessionStorage.removeItem("lastOrder");
        } catch (e) { /* ignore */ }
      }
    });
  </script>
</body>
</html>
